# Build on Cloud Build, push to Artifact Registry, deploy to Cloud Run.
# Run from Cloud Shell (or any machine with gcloud) after bootstrap:
#   gcloud builds submit --config=cloudbuild.yaml
# Then attach Cloud Scheduler (every 20 min → GET /cron/tick with OIDC):
#   ./scripts/gcp-scheduler.sh
#
# Substitutions (override with --substitutions=_KEY=value,...):
#   _REGION, _AR_REPO, _SERVICE_NAME, _SET_SECRETS (see below)

substitutions:
  _REGION: us-central1
  _AR_REPO: moltbook-agent
  _SERVICE_NAME: moltbook-agent
  # Comma-separated Cloud Run --set-secrets value (no spaces). Create secrets first (scripts/gcp-bootstrap.sh).
  _SET_SECRETS: GOOGLE_API_KEY=google-api-key:latest

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --project=${PROJECT_ID}
      - --region=${_REGION}
      - --platform=managed
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_SERVICE_NAME}:${BUILD_ID}
      - --port=8080
      - --cpu=1
      - --memory=512Mi
      - --min-instances=0
      - --max-instances=2
      - --set-env-vars=OTEL_SERVICE_NAME=moltbook-agent,GEMINI_MODEL=gemini-2.0-flash,MOLTBOOK_BASE_URL=https://www.moltbook.com
      - --set-secrets=${_SET_SECRETS}
      - --no-allow-unauthenticated

# Note: do not use top-level `images:` here — it pushes after all steps and would run after deploy.
# After first deploy, run scripts/gcp-scheduler.sh so Cloud Scheduler can invoke /cron/tick with OIDC.
